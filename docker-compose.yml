# Set MONGO_URI in .env to your MongoDB (Atlas, or mongodb://host.docker.internal:27017/educonnect for Mongo on the host).

version: '3.9'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: educonnect_server
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
    ports:
      - '${PORT:-5000}:5000'
    networks:
      - educonnect_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: educonnect_frontend
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - server
    networks:
      - educonnect_net

networks:
  educonnect_net:
    driver: bridge
